name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      # Ruff version kept in sync with `pyproject.toml` [dev] extra and
      # `.pre-commit-config.yaml` to prevent formatter-output drift
      # between CI and local development.
      - run: pip install ruff==0.5.7
      - run: ruff check src tests
      - run: ruff format --check src tests

  typecheck:
    name: Typecheck (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt mypy==1.11.1
      - run: mypy src
        continue-on-error: true  # advisory until Phase 5

  test:
    name: Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    env:
      # `src.*` imports resolve via the repo root; conftest.py at the root
      # also sets GITHUB_MOCK_ALLOWED and TEST_MODE for the test environment.
      PYTHONPATH: "."
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -r requirements.txt
      - run: pip install coverage[toml] pytest pytest-asyncio
      - run: coverage run -m pytest -q
      - run: coverage xml
      # Soft coverage floor: keep it low to unblock CI while we add agent
      # and CLI tests incrementally. Raised as the phase-gate milestones
      # land (see plan: Phase 5 targets 65% global, 80% changed-files).
      - run: coverage report --fail-under=35
      - uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.11'
        with:
          name: coverage-xml
          path: coverage.xml

  security:
    name: Security (bandit + pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install bandit==1.7.9 pip-audit==2.7.3
      - run: bandit -q -r src -x src/staged_agents
        continue-on-error: true  # advisory until Phase 5
      - run: pip-audit -r requirements.txt
        continue-on-error: true  # advisory until Phase 5
